services:
  full-db:
    build:
      context: ../
      dockerfile: docker/full.dockerfile
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - type: volume
        source: full-db-data
        target: /data

volumes:
  full-db-data:
